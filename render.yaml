services:
  - type: web
    name: emergency-inventory-app
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: emergency-inventory-db
          property: connectionString
      - key: APP_PASSWORD
        sync: false

databases:
  - name: emergency-inventory-db
    plan: free
    databaseName: emergency_inventory
    user: emergency_inventory_user
